# docker-compose.yml - defines services for Ollama and RAG API, with shared volume for FAISS index data
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      # - "11434:11434"
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  rag_api:
    build: .
    container_name: rag_api
    depends_on:
      - ollama
    ports:
      # - "8000:8000"
      - "127.0.0.1:8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text
      - CHAT_MODEL=llama3.1
    volumes:
      # mounts FAISS index into the container
      - ./data:/app/data:rw

volumes:
  ollama_data: